# 服务配置
host: "0.0.0.0"
port: 10095

# 模型配置
asr_model_online: "iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online"
asr_model_online_revision: "v2.0.4"
vad_model: "iic/speech_fsmn_vad_zh-cn-16k-common-pytorch"
vad_model_revision: "v2.0.4"
punc_model: "iic/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727"
punc_model_revision: "v2.0.4"

# 运行环境
ngpu: 1
ncpu: 4
device: "auto"
worker_threads: 8

# 并发控制
concurrent_vad: 4
concurrent_asr_online: 4
concurrent_punc: 1

# 静音检测（能量法兜底）
# RMS 低于此值视为静音（int16 量程 0-32768；安静环境建议 200-400，嘈杂环境适当调高）
silence_rms_threshold: 300
# 连续静音超过此毫秒数则强制结束本句（VAD max_end_silence_time 的兜底）
silence_timeout_ms: 1000

# 模型管理
models_dir: "models"
